<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — The Consistent Coders</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body data-barba="wrapper">
  
  <!-- PAGE TRANSITION OVERLAY -->
  <div class="page-transition">
    <div class="transition-layer"></div>
  </div>

  <!-- CURSOR -->
  <div class="cursor"></div>
  <div class="cursor-follower"></div>

  <!-- NAVIGATION -->
  <nav class="main-nav">
    <a href="/" class="nav-logo">TCC</a>
    <div class="nav-menu">
      <a href="/">Home</a>
      <a href="/work.html">Work</a>
      <a href="/about.html">About</a>
      <a href="/contact.html" data-barba-prevent="self">Contact</a>
    </div>
  </nav>

  <!-- MAIN CONTAINER -->
  <main data-barba="container" data-barba-namespace="contact">
    <div class="smooth-scroll">

      <!-- CONTACT HERO -->
      <section class="contact-page" data-scroll-section>
        <div class="contact-page-content">
          <div class="hero-label">
            <span>Get in touch</span>
            <span class="dot"></span>
            <span>Let's talk</span>
          </div>
          
          <h1 class="contact-page-title">
            <div class="line">
              <span class="word">START</span>
            </div>
            <div class="line">
              <span class="word">A PROJECT</span>
            </div>
          </h1>
          
          <div class="contact-info">
            <div class="contact-item">
              <h3>Email</h3>
              <a href="mailto:hello@consistentcoders.com">hello@consistentcoders.com</a>
            </div>
            
            <div class="contact-item">
              <h3>Location</h3>
              <p>Los Angeles, California</p>
            </div>
            
            <div class="contact-item">
              <h3>Social</h3>
              <div class="social-links">
                <a href="#">GitHub</a>
                <a href="#">Twitter</a>
                <a href="#">Dribbble</a>
                <a href="#">LinkedIn</a>
              </div>
            </div>
          </div>

          <div class="contact-form">
            <form>
              <div class="form-group">
                <input type="text" placeholder="Your Name" required>
              </div>
              <div class="form-group">
                <input type="email" placeholder="Your Email" required>
              </div>
              <div class="form-group">
                <input type="text" placeholder="Project Budget">
              </div>
              <div class="form-group">
                <textarea placeholder="Tell us about your project" rows="6" required></textarea>
              </div>
              <button type="submit" class="contact-cta">
                <span class="cta-text">Send Message</span>
                <span class="cta-arrow">→</span>
              </button>
            </form>
          </div>
        </div>
      </section>

      <!-- FOOTER -->
      <footer class="footer" style="padding: 5vh 5vw; border-top: 1px solid rgba(255, 255, 255, 0.1);">
        <div class="footer-left">
          <p>&copy; 2025 The Consistent Coders</p>
        </div>
        <div class="footer-right">
          <a href="#">GitHub</a>
          <a href="#">Twitter</a>
          <a href="#">Dribbble</a>
          <a href="#">LinkedIn</a>
        </div>
      </footer>

    </div>
  </main>

  <script type="module" src="/main.js"></script>
</body>
</html>
